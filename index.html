<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LightQuiz - Multiple Choice</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>🌟 LightQuiz</h1>
        <p>Learn by Chapters</p>
    </header>

    <main>
        <!-- Setup Screen -->
        <div id="setup" class="setup-panel">
            <h2>Select Chapters</h2>
            <div id="chapter-list" class="chapter-list"></div>

            <div class="form-group">
                <label>
                    <input type="checkbox" id="limit-questions" checked>
                    Limit number of questions
                </label>
            </div>

            <div id="limit-options" class="form-group">
                <label for="num-questions">Number of Questions:</label>
                <select id="num-questions">
                    <option value="5">5</option>
                    <option value="10" selected>10</option>
                    <option value="15">15</option>
                    <option value="20">20</option>
                    <option value="30">30</option>
                </select>
            </div>

            <button id="start-btn" class="btn-primary">Start Quiz</button>
            <div id="status" class="status">Loading chapters...</div>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz-container" class="quiz-panel hidden">
            <button id="exit-btn" class="exit-btn">← Exit to Menu</button>
            
            <div class="progress">
                <span>Question <span id="current-q">1</span></span>
                <div class="progress-bar">
                    <div id="progress-fill" class="progress-fill"></div>
                </div>
            </div>

            <div id="question-text" class="question"></div>
            <div id="feedback" class="feedback hidden"></div>
            
            <div id="options" class="options-container"></div>

            <div class="navigation">
                <button id="next-btn" class="btn-primary hidden">Next Question →</button>
            </div>
        </div>

        <!-- Results Screen -->
        <div id="results" class="results-panel hidden">
            <h2>Quiz Complete!</h2>
            <div id="score" class="score"></div>
            <div id="review" class="review"></div>
            <button id="restart-btn" class="btn-primary">Restart Quiz</button>
        </div>
    </main>

    <footer>
        <p>Multi-Chapter Quiz System</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
